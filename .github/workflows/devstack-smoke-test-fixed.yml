name: DevStack Smoke Test (Fixed)

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  devstack-smoke:
    runs-on: ubuntu-24.04
    timeout-minutes: 90  # Erhöht von 60 → 90 Min

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show system info
        run: |
          echo "=== System Info ==="
          uname -a
          df -h
          free -h
          nproc

      - name: Free up disk space
        run: |
          echo "=== Disk space BEFORE cleanup ==="
          df -h

          # Aggressive cleanup for DevStack
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/hostedtoolcache

          echo "=== Disk space AFTER cleanup ==="
          df -h

      - name: Install DevStack dependencies
        run: |
          # DevStack braucht diese Pakete
          sudo apt-get update
          sudo apt-get install -y git python3-pip

      - name: Deploy DevStack (using action)
        id: devstack
        continue-on-error: false
        uses: gophercloud/devstack-action@v0.19
        with:
          branch: stable/2025.1
          conf_overrides: |
            FORCE=yes
            disable_service horizon tempest
            # Use OVN - disables legacy q-agt, q-l3, q-dhcp, q-meta
            ENABLED_SERVICES=mysql,rabbit,key,n-api,n-cpu,n-cond,n-sch,placement-api
            ENABLED_SERVICES+=,g-api,g-reg
            ENABLED_SERVICES+=,c-sch,c-api,c-vol
            ENABLED_SERVICES+=,q-svc,ovn-controller,ovn-northd,q-ovn-metadata-agent

      - name: Check DevStack status
        if: always()
        run: |
          echo "DevStack action outcome: ${{ steps.devstack.outcome }}"

          # Search for DevStack installation
          echo "=== Searching for DevStack installation ==="
          DEVSTACK_DIRS=(
            "/opt/stack/devstack"
            "$HOME/devstack"
            "./devstack"
            "/home/runner/work/bosh-openstack-devstack-poc/bosh-openstack-devstack-poc/devstack"
          )

          FOUND_DIR=""
          for dir in "${DEVSTACK_DIRS[@]}"; do
            if [ -d "$dir" ]; then
              FOUND_DIR="$dir"
              echo "✅ DevStack directory exists at: $dir"
              break
            fi
          done

          if [ -z "$FOUND_DIR" ]; then
            echo "❌ DevStack directory NOT found in common locations"
            echo "Searching entire filesystem (may take a moment)..."
            find /opt /home -type d -name "devstack" 2>/dev/null | head -5 || true
          else
            ls -la "$FOUND_DIR" | head -20

            if [ -f "$FOUND_DIR/openrc" ]; then
              echo "✅ openrc file exists at: $FOUND_DIR/openrc"
            else
              echo "❌ openrc file NOT found at: $FOUND_DIR/openrc"
              find "$FOUND_DIR" -name "openrc" 2>/dev/null || true
            fi

            if [ -d "$FOUND_DIR/logs" ]; then
              echo "✅ DevStack logs found:"
              ls -lh "$FOUND_DIR/logs"/*.log 2>/dev/null | head -5 || echo "No log files"
            else
              echo "⚠️ DevStack logs directory not found at $FOUND_DIR/logs"
              echo "Searching for logs in common locations..."
              find /opt/stack -type d -name "logs" 2>/dev/null | head -3 || true
              find "$FOUND_DIR/.." -type d -name "logs" 2>/dev/null | head -3 || true
            fi
          fi

      - name: Test OpenStack APIs
        if: steps.devstack.outcome == 'success'
        run: |
          # Find openrc file - could be in different locations
          if [ -f "/opt/stack/devstack/openrc" ]; then
            source /opt/stack/devstack/openrc admin admin
          elif [ -f "$HOME/devstack/openrc" ]; then
            source $HOME/devstack/openrc admin admin
          elif [ -f "./devstack/openrc" ]; then
            source ./devstack/openrc admin admin
          else
            echo "❌ Cannot find openrc file"
            find /opt/stack -name "openrc" 2>/dev/null || true
            find $HOME -name "openrc" 2>/dev/null || true
            exit 1
          fi

          # OpenStack CLI installieren (falls nicht vorhanden)
          pip3 install --user python-openstackclient
          export PATH=$PATH:$HOME/.local/bin

          echo "=== OpenStack Endpoints ==="
          openstack endpoint list

          echo "=== Available Services ==="
          openstack service list

          echo "=== Compute Resources ==="
          openstack hypervisor stats show || echo "⚠️ Hypervisor stats unavailable"

          echo "=== Networks ==="
          openstack network list

          echo "=== Flavors ==="
          openstack flavor list

          echo "=== Images ==="
          openstack image list

          echo "✅ DevStack is ready for CPI testing!"

      - name: Save results
        if: always()
        run: |
          mkdir -p results

          echo "=== DevStack Smoke Test Results ===" > results/summary.txt
          echo "" >> results/summary.txt
          echo "Timestamp: $(date)" >> results/summary.txt
          echo "DevStack Action Outcome: ${{ steps.devstack.outcome }}" >> results/summary.txt
          echo "Job Status: ${{ job.status }}" >> results/summary.txt
          echo "" >> results/summary.txt

          if [ -d "/opt/stack/devstack/logs" ]; then
            echo "DevStack logs available: YES" >> results/summary.txt
            echo "Log files:" >> results/summary.txt
            ls -1 /opt/stack/devstack/logs/*.log >> results/summary.txt 2>&1 || echo "  (none)" >> results/summary.txt
          else
            echo "DevStack logs available: NO" >> results/summary.txt
          fi

          cat results/summary.txt

      - name: Upload DevStack logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: devstack-failure-logs
          path: |
            /opt/stack/devstack/logs/
            results/
          retention-days: 7

      - name: Upload results (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: devstack-smoke-results
          path: results/
          retention-days: 7
