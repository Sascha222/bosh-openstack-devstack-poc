name: DevStack Smoke Test

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  devstack-smoke:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          # GitHub Runners haben ~14GB frei, DevStack braucht ~10GB
          df -h
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          df -h

      - name: Deploy DevStack
        uses: gophercloud/devstack-action@v0.6
        with:
          branch: stable/2024.1
          conf_overrides: |
            # Minimale Config
            disable_service horizon tempest
            ENABLED_SERVICES=key,n-api,n-cpu,n-cond,n-sch,placement-api
            ENABLED_SERVICES+=,g-api,g-reg
            ENABLED_SERVICES+=,c-sch,c-api,c-vol
            ENABLED_SERVICES+=,q-svc,q-agt,q-dhcp,q-l3,q-meta

      - name: Test OpenStack APIs
        run: |
          source /opt/stack/devstack/openrc admin admin
          pip3 install python-openstackclient

          echo "=== OpenStack Endpoints ==="
          openstack endpoint list

          echo "=== Available Services ==="
          openstack service list

          echo "=== Compute Resources ==="
          openstack hypervisor stats show

          echo "=== Networks ==="
          openstack network list

          echo "✅ DevStack is ready for CPI testing!"

      - name: Save timing info
        run: |
          echo "Setup completed at: $(date)" > timing.txt
          cat timing.txt

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: devstack-smoke-results
          path: timing.txt
